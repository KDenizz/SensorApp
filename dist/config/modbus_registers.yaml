holding_registers:

  mode_select:
    address: 0
    access: "rw"
    scaling: 1
    description: "Çalışma modu (1-6)"
    mode: "Tüm Modlar"

  total_turns:
    address: 1
    access: "rw"
    scaling: 1
    description: "Toplam tur sayısı"
    mode: "Genel"

  proportional_signal:
    address: 2
    access: "rw"
    scaling: 1
    description: "Oransal sinyal (0-1000)"
    mode: "Mod 02"

  target_step:
    address: 3
    access: "rw"
    scaling: 1
    description: "Hedef adım (Mod 3)"
    mode: "Mod 03"

  fast_open_close:
    address: 5
    access: "rw"
    scaling: 1
    description: "Hızlı aç/kapat (0=kapat, 1=aç)"
    mode: "Mod 04"

  calibration_direction:
    address: 8
    access: "rw"
    scaling: 1
    description: "Kalibrasyon yönü (0=eksi, 1=artı)"
    mode: "Mod 01"

  current_position:
    address: 9
    access: "rw"
    scaling: 1
    description: "Mevcut pozisyon (signed int16)"
    mode: "İzleme"

  current_load:
    address: 10
    access: "rw"
    scaling: 1
    description: "Anlık yük/akım (signed int16)"
    mode: "İzleme"

  calibration_status:
    address: 11
    access: "rw"
    scaling: 1
    description: "Kalibrasyon durumu (0=yapılmadı, 1=hazır)"
    mode: "İzleme"

input_registers:
  dummy:
    address: 0
    access: "ro"
    scaling: 1
    description: "Kullanılmıyor"
    mode: "Yok"